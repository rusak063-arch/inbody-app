<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>InBody Progress Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1e1e2f; color: #c9d1d9;
            padding: 0 0 20px 0;
            margin: 0;
        }
        .header {
            background: #161b22;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #30363d;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header h1 {
            font-size: 1.3em;
            color: #58a6ff;
            margin: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-actions a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 1.2em;
        }
        #logoutBtn {
            background: #da3633;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        #logoutBtn:hover { background: #c42e2b; }
        .upload-container {
            margin: 16px auto;
            background: #161b22;
            padding: 16px;
            border-radius: 12px;
            width: calc(100% - 20px);
            max-width: 500px;
            text-align: center;
        }
        .upload-container form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        input[type="file"] {
            background: #0d1117;
            color: #c9d1d9;
            padding: 12px;
            border: 1px solid #30363d;
            border-radius: 8px;
            width: 100%;
            font-size: 0.95em;
        }
        button[type="submit"] {
            background: #238636;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            width: 100%;
        }
        button[type="submit"]:hover { background: #2ea043; }
        .status { margin-top: 10px; font-size: 0.9em; }
        .summary {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 16px auto;
            max-width: 1100px;
            padding: 0 10px;
        }
        .card {
            background: #161b22;
            border-radius: 12px;
            padding: 12px 8px;
            flex: 1 0 100px;
            text-align: center;
            max-width: 140px;
            min-width: 90px;
        }
        .card .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #58a6ff;
            word-break: break-word;
        }
        .card .label {
            font-size: 0.7em;
            color: #8b949e;
            margin-top: 4px;
        }
        .chart-container {
            width: calc(100% - 16px);
            max-width: 900px;
            margin: 20px auto;
            background: #161b22;
            border-radius: 12px;
            padding: 12px;
        }
        canvas { max-height: 280px; height: auto; width: 100% !important; }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.1em; }
            .card .value { font-size: 1.3em; }
            canvas { max-height: 220px; }
            .upload-container { padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 InBody</h1>
        <div class="header-actions">
            <a href="/settings.html" title="Настройки">⚙️</a>
            <a href="/admin.html" title="Администрирование" style="font-size:1.2em;">🔧</a>
            <button id="logoutBtn">🚪 Выйти</button>
        </div>
    </div>

    <div class="upload-container">
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <input type="file" id="pdfFile" name="file" accept=".pdf" required>
            <button type="submit">Загрузить PDF</button>
        </form>
        <div id="uploadStatus" class="status"></div>
    </div>

    <div id="summaryContainer" class="summary"></div>

    <div class="chart-container"><canvas id="weightChart"></canvas></div>
    <div class="chart-container"><canvas id="muscleFatChart"></canvas></div>
    <div class="chart-container"><canvas id="visceralChart"></canvas></div>
    <div class="chart-container"><canvas id="bmrChart"></canvas></div>

    <script>
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        const token = localStorage.getItem('token');
        if (!token) window.location.href = '/login.html';

        async function authFetch(url, options = {}) {
            const headers = { 'Authorization': 'Bearer ' + token, ...options.headers };
            const res = await fetch(url, { ...options, headers });
            if (res.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login.html';
                throw new Error('Unauthorized');
            }
            return res;
        }

        Chart.defaults.color = '#c9d1d9';
        Chart.defaults.borderColor = '#30363d';

        function parseDate(str) {
            if (!str) return null;
            const parts = String(str).split('-');
            if (parts.length !== 3) return null;
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        }

        function formatDateLabel(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return dateStr;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}.${month}`;
        }

        function createTimeChartConfig(datasets, customScales = {}) {
            return {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: {
                                boxWidth: 12,
                                padding: 8,
                                font: { size: 10 }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: { day: 'dd.MM' }
                            },
                            grid: { color: '#30363d' },
                            ticks: { maxTicksLimit: 6, font: { size: 9 } }
                        },
                        y: {
                            beginAtZero: false,
                            grace: '5%',
                            ticks: { maxTicksLimit: 5, font: { size: 9 } },
                            grid: { color: '#30363d' }
                        },
                        ...customScales
                    }
                }
            };
        }

        async function fetchData() {
            const res = await authFetch('/measurements/');
            if (!res.ok) throw new Error('Ошибка загрузки данных');
            return await res.json();
        }

        function renderSummary(data) {
            const container = document.getElementById('summaryContainer');
            if (data.length === 0) {
                container.innerHTML = '<p style="text-align:center; grid-column:1/-1">Нет данных</p>';
                return;
            }
            const last = data[data.length-1];
            const cards = [
                {label: 'Дата', value: formatDateLabel(last.date)},
                {label: 'Вес, кг', value: last.weight_kg},
                {label: 'Мышцы, кг', value: last.muscle_kg},
                {label: 'Жир, %', value: last.fat_percent},
                {label: 'Висцеральный', value: last.visceral_fat_level},
                {label: 'ИМТ', value: last.bmi},
                {label: 'Осн. обмен', value: last.bmr_kcal + ' ккал'},
            ];
            container.innerHTML = cards.map(c =>
                `<div class="card"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
            ).join('');
        }

        function renderCharts(data) {
            if (data.length === 0) return;

            const weightPoints = data.map(d => ({ x: parseDate(d.date), y: d.weight_kg }));
            const musclePoints = data.map(d => ({ x: parseDate(d.date), y: d.muscle_kg }));
            const fatPoints = data.map(d => ({ x: parseDate(d.date), y: d.fat_percent }));
            const visceralPoints = data.map(d => ({ x: parseDate(d.date), y: d.visceral_fat_level }));
            const bmrPoints = data.map(d => ({ x: parseDate(d.date), y: d.bmr_kcal }));
            const optimalWeightPoints = data.map(d => ({ x: parseDate(d.date), y: d.optimal_weight_kg }));

            // График веса + оптимальный вес
            new Chart(document.getElementById('weightChart'), createTimeChartConfig([
                {
                    label: 'Вес (кг)',
                    data: weightPoints,
                    borderColor: '#58a6ff',
                    backgroundColor: 'rgba(88,166,255,0.1)',
                    fill: true,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#58a6ff',
                    tension: 0.2,
                    order: 1
                },
                {
                    label: 'Оптимальный вес (кг)',
                    data: optimalWeightPoints,
                    borderColor: '#58a6ff',
                    backgroundColor: 'transparent',
                    borderDash: [6, 4],
                    pointRadius: 2,
                    pointHoverRadius: 4,
                    pointBackgroundColor: '#58a6ff',
                    tension: 0.2,
                    fill: false,
                    order: 0
                }
            ]));

            new Chart(document.getElementById('muscleFatChart'), createTimeChartConfig([
                {
                    label: 'Мышцы (кг)',
                    data: musclePoints,
                    borderColor: '#3fb950',
                    backgroundColor: 'rgba(63,185,80,0.1)',
                    yAxisID: 'y',
                    tension: 0.2,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#3fb950'
                },
                {
                    label: 'Жир (%)',
                    data: fatPoints,
                    borderColor: '#f85149',
                    backgroundColor: 'rgba(248,81,73,0.1)',
                    yAxisID: 'y1',
                    tension: 0.2,
                    pointRadius: 3,
                    pointHoverRadius: 5,
                    pointBackgroundColor: '#f85149'
                }
            ], {
                y: {
                    type: 'linear',
                    position: 'left',
                    title: { display: true, text: 'кг' },
                    beginAtZero: false,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, font: { size: 9 } }
                },
                y1: {
                    type: 'linear',
                    position: 'right',
                    title: { display: true, text: '%' },
                    beginAtZero: false,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, font: { size: 9 } },
                    grid: { drawOnChartArea: false }
                }
            }));

            new Chart(document.getElementById('visceralChart'), createTimeChartConfig([{
                label: 'Висцеральный жир (уровень)',
                data: visceralPoints,
                borderColor: '#d2991d',
                backgroundColor: 'rgba(210,153,29,0.1)',
                fill: true,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointBackgroundColor: '#d2991d',
                tension: 0.2
            }], {
                y: {
                    beginAtZero: true,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, stepSize: 1, font: { size: 9 } }
                }
            }));

            new Chart(document.getElementById('bmrChart'), createTimeChartConfig([{
                label: 'Основной обмен (ккал)',
                data: bmrPoints,
                borderColor: '#c084fc',
                backgroundColor: 'rgba(192,132,252,0.1)',
                fill: true,
                pointRadius: 3,
                pointHoverRadius: 5,
                pointBackgroundColor: '#c084fc',
                tension: 0.2
            }], {
                y: {
                    beginAtZero: false,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, stepSize: 10, font: { size: 9 } }
                }
            }));
        }

        fetchData().then(data => {
            renderSummary(data);
            renderCharts(data);
        }).catch(err => {
            if (err.message !== 'Unauthorized') {
                document.body.innerHTML += `<p style="color:red; text-align:center">Ошибка: ${err.message}</p>`;
            }
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pdfFile');
            const status = document.getElementById('uploadStatus');
            if (!fileInput.files.length) return;
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            status.textContent = 'Загрузка...';
            try {
                const res = await authFetch('/upload/', { method: 'POST', body: formData });
                const result = await res.json();
                if (!res.ok) throw new Error(result.detail || 'Ошибка сервера');
                status.textContent = `✅ ${result.message}`;
                setTimeout(() => location.reload(), 1000);
            } catch (err) {
                if (err.message !== 'Unauthorized') {
                    status.textContent = `❌ ${err.message}`;
                }
            }
        });
    </script>
</body>
</html>
