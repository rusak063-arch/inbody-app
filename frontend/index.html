<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>InBody Progress Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f; color: #c9d1d9; padding: 10px;
        }
        h1 { text-align: center; color: #58a6ff; margin-bottom: 15px; font-size: 1.5em; }
        .upload-container {
            text-align: center; margin: 10px auto;
            background: #161b22; padding: 12px; border-radius: 10px;
            width: 100%; max-width: 500px;
        }
        input[type="file"] {
            background: #0d1117; color: #c9d1d9;
            padding: 10px; border: 1px solid #30363d;
            border-radius: 6px; width: 100%; max-width: 280px; margin: 5px 0;
            font-size: 0.9em;
        }
        button {
            background: #238636; color: white; border: none;
            padding: 12px 25px; border-radius: 6px; cursor: pointer;
            font-weight: bold; margin: 5px 0; width: 100%; max-width: 280px;
            font-size: 1em;
        }
        button:hover { background: #2ea043; }
        .status { margin-top: 10px; font-size: 0.9em; }

        .summary {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin: 15px auto; max-width: 1100px;
        }
        .card {
            background: #161b22; border-radius: 12px; padding: 12px 10px;
            flex: 1 0 110px; text-align: center; max-width: 150px;
        }
        .card .value { font-size: 1.6em; font-weight: bold; color: #58a6ff; }
        .card .label { font-size: 0.75em; color: #8b949e; margin-top: 5px; }

        .chart-container {
            width: 100%; max-width: 900px; margin: 20px auto;
            background: #161b22; border-radius: 12px; padding: 12px;
        }
        canvas { max-height: 300px; height: auto; }

        #logoutBtn { float: right; background: #da3633; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        @media (max-width: 600px) {
            body { padding: 5px; }
            h1 { font-size: 1.3em; }
            .card { flex: 1 0 100px; padding: 10px; }
            .card .value { font-size: 1.4em; }
            canvas { max-height: 250px; }
        }
    </style>
</head>
<body>
    <div style="text-align: right;"><button id="logoutBtn">Выйти</button></div>
    <h1>📊 Прогресс по InBody</h1>
    <div class="upload-container">
        <form id="uploadForm" method="POST" enctype="multipart/form-data">
            <input type="file" id="pdfFile" name="file" accept=".pdf" required>
            <button type="submit">Загрузить PDF</button>
        </form>
        <div id="uploadStatus" class="status"></div>
    </div>

    <div id="summaryContainer" class="summary"></div>

    <div class="chart-container"><canvas id="weightChart"></canvas></div>
    <div class="chart-container"><canvas id="muscleFatChart"></canvas></div>
    <div class="chart-container"><canvas id="visceralChart"></canvas></div>
    <div class="chart-container"><canvas id="bmrChart"></canvas></div>

    <script>
        // Проверка авторизации
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        });

        // Функция для fetch с токеном
        async function authFetch(url, options = {}) {
            const headers = { 'Authorization': 'Bearer ' + token, ...options.headers };
            return fetch(url, { ...options, headers });
        }

        Chart.defaults.color = '#c9d1d9';
        Chart.defaults.borderColor = '#30363d';

        function parseDate(str) {
            if (!str) return null;
            const parts = String(str).split('-');
            if (parts.length !== 3) return null;
            return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
        }

        function formatDateLabel(dateStr) {
            const d = parseDate(dateStr);
            if (!d) return dateStr;
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}.${month}`;
        }

        function createTimeChartConfig(datasets, customScales = {}) {
            return {
                type: 'line',
                data: { datasets },
                options: {
                    responsive: true,
                    interaction: { mode: 'index', intersect: false },
                    plugins: {
                        legend: {
                            labels: {
                                boxWidth: 12,
                                padding: 10,
                                font: { size: 11 }
                            }
                        }
                    },
                    scales: {
                        x: {
                            type: 'time',
                            time: {
                                unit: 'day',
                                displayFormats: { day: 'dd.MM' }
                            },
                            grid: { color: '#30363d' },
                            ticks: { maxTicksLimit: 8, font: { size: 10 } }
                        },
                        y: {
                            beginAtZero: false,
                            grace: '5%',
                            ticks: { maxTicksLimit: 5, font: { size: 10 } },
                            grid: { color: '#30363d' }
                        },
                        ...customScales
                    }
                }
            };
        }

        async function fetchData() {
            const res = await authFetch('/measurements/');
            if (!res.ok) throw new Error('Ошибка загрузки данных');
            return await res.json();
        }

        function renderSummary(data) {
            const container = document.getElementById('summaryContainer');
            if (data.length === 0) {
                container.innerHTML = '<p style="text-align:center">Нет данных</p>';
                return;
            }
            const last = data[data.length-1];
            const cards = [
                {label: 'Дата', value: formatDateLabel(last.date)},
                {label: 'Вес, кг', value: last.weight_kg},
                {label: 'Мышцы, кг', value: last.muscle_kg},
                {label: 'Жир, %', value: last.fat_percent},
                {label: 'Висцеральный', value: last.visceral_fat_level},
                {label: 'ИМТ', value: last.bmi},
                {label: 'Осн. обмен', value: last.bmr_kcal + ' ккал'},
            ];
            container.innerHTML = cards.map(c =>
                `<div class="card"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
            ).join('');
        }

        function renderCharts(data) {
            if (data.length === 0) return;

            const weightPoints = data.map(d => ({ x: parseDate(d.date), y: d.weight_kg }));
            const musclePoints = data.map(d => ({ x: parseDate(d.date), y: d.muscle_kg }));
            const fatPoints = data.map(d => ({ x: parseDate(d.date), y: d.fat_percent }));
            const visceralPoints = data.map(d => ({ x: parseDate(d.date), y: d.visceral_fat_level }));
            const bmrPoints = data.map(d => ({ x: parseDate(d.date), y: d.bmr_kcal }));

            new Chart(document.getElementById('weightChart'), createTimeChartConfig([{
                label: 'Вес (кг)',
                data: weightPoints,
                borderColor: '#58a6ff',
                backgroundColor: 'rgba(88,166,255,0.1)',
                fill: true,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#58a6ff',
                tension: 0.2
            }]));

            new Chart(document.getElementById('muscleFatChart'), createTimeChartConfig([
                {
                    label: 'Мышцы (кг)',
                    data: musclePoints,
                    borderColor: '#3fb950',
                    backgroundColor: 'rgba(63,185,80,0.1)',
                    yAxisID: 'y',
                    tension: 0.2,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    pointBackgroundColor: '#3fb950'
                },
                {
                    label: 'Жир (%)',
                    data: fatPoints,
                    borderColor: '#f85149',
                    backgroundColor: 'rgba(248,81,73,0.1)',
                    yAxisID: 'y1',
                    tension: 0.2,
                    pointRadius: 4,
                    pointHoverRadius: 6,
                    pointBackgroundColor: '#f85149'
                }
            ], {
                y: {
                    type: 'linear',
                    position: 'left',
                    title: { display: true, text: 'кг' },
                    beginAtZero: false,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, font: { size: 10 } }
                },
                y1: {
                    type: 'linear',
                    position: 'right',
                    title: { display: true, text: '%' },
                    beginAtZero: false,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, font: { size: 10 } },
                    grid: { drawOnChartArea: false }
                }
            }));

            new Chart(document.getElementById('visceralChart'), createTimeChartConfig([{
                label: 'Висцеральный жир (уровень)',
                data: visceralPoints,
                borderColor: '#d2991d',
                backgroundColor: 'rgba(210,153,29,0.1)',
                fill: true,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#d2991d',
                tension: 0.2
            }], {
                y: {
                    beginAtZero: true,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, stepSize: 1, font: { size: 10 } }
                }
            }));

            new Chart(document.getElementById('bmrChart'), createTimeChartConfig([{
                label: 'Основной обмен (ккал)',
                data: bmrPoints,
                borderColor: '#c084fc',
                backgroundColor: 'rgba(192,132,252,0.1)',
                fill: true,
                pointRadius: 4,
                pointHoverRadius: 6,
                pointBackgroundColor: '#c084fc',
                tension: 0.2
            }], {
                y: {
                    beginAtZero: false,
                    grace: '5%',
                    ticks: { maxTicksLimit: 5, stepSize: 10, font: { size: 10 } }
                }
            }));
        }

        fetchData().then(data => {
            renderSummary(data);
            renderCharts(data);
        }).catch(err => {
            document.body.innerHTML += `<p style="color:red; text-align:center">Ошибка: ${err.message}</p>`;
        });

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fileInput = document.getElementById('pdfFile');
            const status = document.getElementById('uploadStatus');
            if (!fileInput.files.length) return;
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            status.textContent = 'Загрузка...';
            try {
                const res = await authFetch('/upload/', { method: 'POST', body: formData });
                const result = await res.json();
                if (!res.ok) throw new Error(result.detail || 'Ошибка сервера');
                status.textContent = `✅ ${result.message}`;
                setTimeout(() => location.reload(), 1000);
            } catch (err) {
                status.textContent = `❌ ${err.message}`;
            }
        });
    </script>
</body>
</html>
