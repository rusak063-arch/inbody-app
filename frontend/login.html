<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InBody - Вход</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #1e1e2f; color: #c9d1d9;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }
        .login-box {
            background: #161b22; padding: 30px; border-radius: 10px;
            width: 300px; text-align: center;
        }
        input {
            width: 100%; padding: 10px; margin: 10px 0;
            background: #0d1117; color: #c9d1d9; border: 1px solid #30363d;
            border-radius: 5px;
        }
        button {
            background: #238636; color: white; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer;
            width: 100%; font-weight: bold;
        }
        button:hover { background: #2ea043; }
        a { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Вход</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="password" id="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <p>Нет аккаунта? <a href="/register.html">Регистрация</a></p>
        <p id="error" style="color:red;"></p>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            const res = await fetch('/auth/login', { method: 'POST', body: formData });
            if (res.ok) {
                const data = await res.json();
                // Сохраняем в localStorage И в cookie
                localStorage.setItem('token', data.access_token);
                document.cookie = `token=${data.access_token}; path=/; max-age=2592000; SameSite=Lax`;
                window.location.href = '/';
            } else {
                document.getElementById('error').textContent = 'Неверный логин или пароль';
            }
        });
    </script>
</body>
</html>
